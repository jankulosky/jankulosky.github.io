<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function redirectToSpaRoute(pathSegmentsToKeep) {
        var location = window.location;
        var preservedPath = location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/");

        var redirectUrl =
          location.protocol +
          "//" +
          location.hostname +
          (location.port ? ":" + location.port : "") +
          location.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          preservedPath +
          (location.search
            ? "&" + location.search.slice(1).replace(/&/g, "~and~")
            : "") +
          location.hash;

        location.replace(redirectUrl);
      })(0);
    </script>
  </head>
  <body></body>
</html>
